<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Itim&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Notable&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

  <link rel="shortcut icon" href="images/roga-logo.png" type="image/x-icon">
  <link rel="stylesheet" href="css/styles.css">
  <title>Информация</title>
</head>
<body>
  <main>
    <div class="roga-content-container">
      <div class="roga-header">
        <div class="logo-container">
          <img src="images/roga-logo.png" alt="roga`s logo">
          <p>roga.ru</p>
        </div>
        <div class="side-menu-container" id="menuNavigationId" onclick="window.location.href = 'catalogue.html';">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#63DB53" class="bi bi-car-front" viewBox="0 0 16 16">
            <path d="M4 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0m10 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0M6 8a1 1 0 0 0 0 2h4a1 1 0 1 0 0-2zM4.862 4.276 3.906 6.19a.51.51 0 0 0 .497.731c.91-.073 2.35-.17 3.597-.17s2.688.097 3.597.17a.51.51 0 0 0 .497-.731l-.956-1.913A.5.5 0 0 0 10.691 4H5.309a.5.5 0 0 0-.447.276"/>
            <path d="M2.52 3.515A2.5 2.5 0 0 1 4.82 2h6.362c1 0 1.904.596 2.298 1.515l.792 1.848c.075.175.21.319.38.404.5.25.855.715.965 1.262l.335 1.679q.05.242.049.49v.413c0 .814-.39 1.543-1 1.997V13.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-1.338c-1.292.048-2.745.088-4 .088s-2.708-.04-4-.088V13.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-1.892c-.61-.454-1-1.183-1-1.997v-.413a2.5 2.5 0 0 1 .049-.49l.335-1.68c.11-.546.465-1.012.964-1.261a.8.8 0 0 0 .381-.404l.792-1.848ZM4.82 3a1.5 1.5 0 0 0-1.379.91l-.792 1.847a1.8 1.8 0 0 1-.853.904.8.8 0 0 0-.43.564L1.03 8.904a1.5 1.5 0 0 0-.03.294v.413c0 .796.62 1.448 1.408 1.484 1.555.07 3.786.155 5.592.155s4.037-.084 5.592-.155A1.48 1.48 0 0 0 15 9.611v-.413q0-.148-.03-.294l-.335-1.68a.8.8 0 0 0-.43-.563 1.8 1.8 0 0 1-.853-.904l-.792-1.848A1.5 1.5 0 0 0 11.18 3z"/>
          </svg>
          <p>Каталог</p>
        </div>
        <div class="admin-actions-container">
          <button class="edit-car-button" onclick="window.location.href = 'edit_car_form.html';">
            изменить
          </button>
          <button class="delete-car-button" onclick="confirm('Are you sure to delete this car?');">
              удалить
          </button>
        </div>
      </div>
      <div class="detail-info-container">
        <div class="detail-car-image-container">
          <img src="images/used_car_toyota.jpg" alt="">
        </div>
        <h2>Toyota supra A90</h2>
        <div class="detail-car-info">
          <div class="info-row">
            <div class="info-option-container">
              <p>Состояние</p>
            </div>
            <div class="info-value-container">
              <p>9/10</p>
            </div>
          </div>
          <div class="info-row">
            <div class="info-option-container">
              <p>Владельцы</p>
            </div>
            <div class="info-value-container">
              <p>9</p>
            </div>
          </div>
          <div class="info-row">
            <div class="info-option-container">
              <p>Пробег</p>
            </div>
            <div class="info-value-container">
              <p>100.500</p>
            </div>
          </div>
          <div class="price-container">
            <p>
              100.500.000
            </p>
          </div>
        </div>
      </div>
      <div class="contact-manager-container">
        <p>Телефон менеджера</p> <p>+8 (903) 123 45 67</p>
      </div>
      <div class="roga-footer">
        <div class="law-info-container">
          <p class="description">Roga.ru все права защищены</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
